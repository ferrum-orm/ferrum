name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Build abi3 wheels with cibuildwheel + maturin
  # ---------------------------------------------------------------------------
  build-wheels:
    name: Build wheels (${{ matrix.platform }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      # Don't cancel the other platform wheels if one fails.
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            runs-on: ubuntu-latest
            cibw-archs: x86_64
          # Native ARM64 runner (free for public repos) — avoids QEMU emulation,
          # which made the Rust compile ~5x slower and gated the whole stage.
          - platform: linux-aarch64
            runs-on: ubuntu-24.04-arm
            cibw-archs: aarch64
          - platform: macos-arm64
            runs-on: macos-latest
            cibw-archs: arm64
            macos-target: "11.0"
          # Intel macOS (macos-13) runners are deprecated and queue indefinitely;
          # cross-compile the x86_64 wheel on the Apple-Silicon runner instead.
          - platform: macos-x86_64
            runs-on: macos-latest
            cibw-archs: x86_64
            # rustc's minimum is 10.12, so the abi3 .so can't satisfy the 10.9
            # floor cibuildwheel/delocate would otherwise tag x86_64 wheels with.
            macos-target: "10.12"

    steps:
      - uses: actions/checkout@v4

      - uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_BUILD: "cp311-* cp312-* cp313-*"
          # ADR-005 ships manylinux (glibc) wheels only; skip musllinux so the
          # linux artifact doesn't carry a musl wheel that pip can't install on
          # the glibc smoke-install / security-gate runners.
          CIBW_SKIP: "*musllinux*"
          CIBW_ARCHS: ${{ matrix.cibw-archs }}
          # manylinux containers may already ship a rustup toolchain; combined with
          # this repo's rust-toolchain.toml (which requests clippy/rustfmt), the build
          # then tries to add clippy and conflicts ("detected conflict: bin/cargo-clippy").
          # Install Rust into an isolated CARGO_HOME/RUSTUP_HOME so the pinned toolchain
          # and its components install fresh, with no preexisting binaries to collide with.
          CIBW_BEFORE_ALL_LINUX: "export CARGO_HOME=/opt/cw-cargo RUSTUP_HOME=/opt/cw-rustup && curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain 1.87.0 --no-modify-path"
          # RUSTUP_TOOLCHAIN pins the toolchain directly, so cargo ignores
          # rust-toolchain.toml and never tries to sync its clippy/rustfmt
          # components (which intermittently conflict with the image's cargo-clippy).
          # The wheel build needs only rustc/cargo/std, which the minimal install has.
          CIBW_ENVIRONMENT_LINUX: 'PATH="/opt/cw-cargo/bin:$PATH" CARGO_HOME=/opt/cw-cargo RUSTUP_HOME=/opt/cw-rustup RUSTUP_TOOLCHAIN=1.87.0'
          # macOS: install rust only if absent, then add the apple targets so maturin can
          # honor cibuildwheel's ARCHFLAGS and cross-compile x86_64 on the arm64 runner.
          CIBW_BEFORE_ALL_MACOS: "command -v cargo >/dev/null 2>&1 || [ -x $HOME/.cargo/bin/cargo ] || curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal; export PATH=$HOME/.cargo/bin:$PATH; rustup target add x86_64-apple-darwin aarch64-apple-darwin"
          CIBW_ENVIRONMENT: 'PATH="$HOME/.cargo/bin:$PATH"'
          # Platform overrides fully replace CIBW_ENVIRONMENT on macOS, so repeat PATH.
          # Pin the deployment target per-arch so the wheel tag matches the .so's min macOS.
          CIBW_ENVIRONMENT_MACOS: 'PATH="$HOME/.cargo/bin:$PATH" MACOSX_DEPLOYMENT_TARGET=${{ matrix.macos-target }}'

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform }}
          path: wheelhouse/*.whl

  # ---------------------------------------------------------------------------
  # Build sdist
  # ---------------------------------------------------------------------------
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - run: pip install maturin
      - run: maturin sdist --out dist/
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ---------------------------------------------------------------------------
  # Windows sdist smoke: Windows is sdist-only in v0.1 (ADR-005). Prove that
  # `pip install` from the sdist compiles the Rust extension and imports on
  # Windows. No Windows wheel is produced.
  # ---------------------------------------------------------------------------
  windows-sdist-smoke:
    name: Windows sdist smoke
    needs: [build-sdist]
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install from sdist (compiles the Rust extension) and import
        run: |
          pip install dist/*.tar.gz
          python -c "import ferrum; print(ferrum.__version__)"

  # ---------------------------------------------------------------------------
  # Smoke-install each wheel
  # ---------------------------------------------------------------------------
  smoke-install:
    name: Smoke install (${{ matrix.python-version }})
    needs: [build-wheels]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-linux-x86_64
          path: wheels/
          merge-multiple: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install wheels/*.whl
      - run: python -c "import ferrum; print(ferrum.__version__)"

  # ---------------------------------------------------------------------------
  # Security gate on the built wheel (not just dev build)
  # ---------------------------------------------------------------------------
  security-gate-wheel:
    name: Security gate (wheel)
    needs: [smoke-install]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ferrum_test
          POSTGRES_USER: ferrum_test
          POSTGRES_DB: ferrum_test
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://ferrum_test:ferrum_test@localhost:5432/ferrum_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-linux-x86_64
          path: wheels/
          merge-multiple: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Install the exact locally-built wheel by path first, so we qualify THIS
      # build (not a possibly-stale PyPI 0.1.0). Then add the cli/dotenv extras and
      # test deps from PyPI — the security suite imports ferrum.cli (rich/typer).
      # ferrum-orm is already satisfied by the wheel, so pip won't refetch it.
      - run: pip install wheels/*.whl
      - run: pip install "ferrum-orm[cli,dotenv]" pytest pytest-asyncio
      - name: Run security qualification on the wheel
        run: pytest tests/python/security -m security -v

  # ---------------------------------------------------------------------------
  # Publish to PyPI (manual environment gate)
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to PyPI
    needs: [security-gate-wheel, build-sdist, windows-sdist-smoke]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write # Trusted Publishing (OIDC) — no long-lived PyPI token (§7.3)
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # The 0.1.0 wheels already uploaded before the sdist failed; skip files
          # that already exist so the re-run just adds the (now-fixed) sdist.
          skip-existing: true
