name: Nightly

on:
  schedule:
    # Run at 02:00 UTC every day.
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Linux full matrix — postgres service is available, so all tests run.
  full-matrix:
    name: Full matrix (ubuntu / py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ferrum_test
          POSTGRES_USER: ferrum_test
          POSTGRES_DB: ferrum_test
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://ferrum_test:ferrum_test@localhost:5432/ferrum_test

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Create virtualenv
        run: python -m venv .venv
      - name: Install maturin and dev deps
        run: |
          . .venv/bin/activate
          pip install maturin
          pip install -e ".[dev]"
      - name: Build extension (debug)
        run: |
          . .venv/bin/activate
          maturin develop
      - name: Run tests
        run: |
          . .venv/bin/activate
          pytest tests/python/ -m "not benchmark" -v

  # macOS full matrix — service containers are Linux-only (no Docker on macOS
  # runners), so no postgres here; build the extension and run unit/property
  # tests only, as ci.yml does.
  full-matrix-macos:
    name: Full matrix (macos / py${{ matrix.python-version }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Create virtualenv
        run: python -m venv .venv
      - name: Install maturin and dev deps
        run: |
          . .venv/bin/activate
          pip install maturin
          pip install -e ".[dev]"
      - name: Build extension (debug)
        run: |
          . .venv/bin/activate
          maturin develop
      - name: Run unit + property tests
        run: |
          . .venv/bin/activate
          pytest tests/python/unit tests/python/property -v

  # Windows sdist smoke
  windows-sdist:
    name: Windows sdist smoke
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install maturin
      - run: maturin build --sdist -o dist/
      - run: pip install dist/*.tar.gz

  # Dependency vulnerability check
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Install cargo-deny
        # Build with the latest stable: rust-toolchain.toml pins 1.87 for the repo,
        # but a current cargo-deny is needed to parse CVSS 4.0 RUSTSEC advisories.
        run: cargo +stable install cargo-deny --locked
      - run: cargo deny check
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit pydantic asyncpg
      - run: pip-audit

  # Benchmark run (non-blocking; opens an issue on regression > 10%)
  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Create virtualenv
        run: python -m venv .venv
      - name: Install maturin and dev deps
        run: |
          . .venv/bin/activate
          pip install maturin
          pip install -e ".[dev]"
      - name: Build extension (release)
        run: |
          . .venv/bin/activate
          maturin develop --release
      - name: Rust criterion benchmarks
        run: cargo bench --workspace 2>&1 | tee bench-rust.txt
      - name: Python benchmarks
        run: |
          . .venv/bin/activate
          pytest tests/python/ -m benchmark --benchmark-json=bench-python.json 2>&1 | tee bench-python.txt
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            bench-rust.txt
            bench-python.json
