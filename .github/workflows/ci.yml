name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref to save CI budget.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Rust linting (fast, no build)
  # ---------------------------------------------------------------------------
  lint-rust:
    name: Rust lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # ---------------------------------------------------------------------------
  # Rust compilation + boundary check
  # ---------------------------------------------------------------------------
  check-rust:
    name: Rust check + boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace
      # Ensure ferrum-core and ferrum-sql have NO pyo3/tokio dependency.
      - name: Boundary check — ferrum-core must not depend on pyo3 or tokio
        run: |
          cargo tree -p ferrum-core --edges normal | grep -E "pyo3|tokio" && echo "FAIL: forbidden dep found" && exit 1 || echo "OK: no forbidden deps"
      - name: Boundary check — ferrum-sql must not depend on pyo3 or tokio
        run: |
          cargo tree -p ferrum-sql --edges normal | grep -E "pyo3|tokio" && echo "FAIL: forbidden dep found" && exit 1 || echo "OK: no forbidden deps"

  # ---------------------------------------------------------------------------
  # Rust tests (unit + proptest)
  # ---------------------------------------------------------------------------
  test-rust:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      # ferrum-pyo3 is a cdylib; it is tested via the Python integration tests.
      # Only ferrum-core and ferrum-sql have standalone cargo unit tests.
      - run: cargo test -p ferrum-core -p ferrum-sql

  # ---------------------------------------------------------------------------
  # Python linting
  # ---------------------------------------------------------------------------
  lint-python:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check python/ tests/
      - run: ruff format --check python/ tests/

  # ---------------------------------------------------------------------------
  # Python type checking
  # ---------------------------------------------------------------------------
  type-python:
    name: Python types (mypy strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install mypy pydantic asyncpg
      - run: mypy python/ferrum --strict

  # ---------------------------------------------------------------------------
  # Import boundary enforcement
  # ---------------------------------------------------------------------------
  import-boundary:
    name: Import boundary (import-linter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install import-linter pydantic
      - run: lint-imports

  # ---------------------------------------------------------------------------
  # Python tests — matrix (build extension + pytest)
  # ---------------------------------------------------------------------------
  test-python:
    name: Python tests (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: [check-rust, lint-python]

    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu: full Python minor matrix
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          # macOS arm64: reduced set (cost control)
          - os: macos-latest
            python-version: "3.11"
          - os: macos-latest
            python-version: "3.13"

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ferrum_test
          POSTGRES_USER: ferrum_test
          POSTGRES_DB: ferrum_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://ferrum_test:ferrum_test@localhost:5432/ferrum_test

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install maturin and dev deps
        run: |
          pip install maturin
          pip install -e ".[dev]"

      - name: Build extension (debug)
        run: maturin develop

      - name: Run unit + property tests
        run: pytest tests/python/unit tests/python/property -v

      - name: Run integration tests
        run: pytest tests/python/integration -m integration -v

  # ---------------------------------------------------------------------------
  # Security qualification gate (required for release)
  # ---------------------------------------------------------------------------
  security-qual:
    name: Security qualification
    runs-on: ubuntu-latest
    needs: [test-python]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ferrum_test
          POSTGRES_USER: ferrum_test
          POSTGRES_DB: ferrum_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://ferrum_test:ferrum_test@localhost:5432/ferrum_test

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install maturin && pip install -e ".[dev]"
      - run: maturin develop
      - name: Run security qualification suite
        run: pytest tests/python/security -m security -v --tb=short

  # ---------------------------------------------------------------------------
  # Docs check: public API changes must have docs diff
  # ---------------------------------------------------------------------------
  docs-check:
    name: Docs check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check that README.md was updated alongside public API changes
        run: |
          # If any file in python/ferrum/ changed, README.md must also have changed.
          PY_CHANGED=$(git diff --name-only origin/main...HEAD -- 'python/ferrum/**' | wc -l)
          README_CHANGED=$(git diff --name-only origin/main...HEAD -- README.md | wc -l)
          if [ "$PY_CHANGED" -gt 0 ] && [ "$README_CHANGED" -eq 0 ]; then
            echo "::warning::python/ferrum/ changed but README.md was not updated. Public API changes require docs (AGENTS.md §2.8)."
          fi
