name: CI

on:
  push:
    branches: [main]
    # Skip CI for changes that can't affect the build/test outcome (e.g. the
    # release workflow). Add more paths here as needed.
    paths-ignore:
      - ".github/workflows/release.yml"
  pull_request:
    branches: [main]
    paths-ignore:
      - ".github/workflows/release.yml"

# Cancel in-progress runs for the same ref to save CI budget.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Rust linting (fast, no build)
  # ---------------------------------------------------------------------------
  lint-rust:
    name: Rust lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # ---------------------------------------------------------------------------
  # Rust compilation + boundary check
  # ---------------------------------------------------------------------------
  check-rust:
    name: Rust check + boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace
      # Ensure ferrum-core and ferrum-sql have NO pyo3/tokio dependency.
      - name: Boundary check — ferrum-core must not depend on pyo3 or tokio
        run: |
          cargo tree -p ferrum-core --edges normal | grep -E "pyo3|tokio" && echo "FAIL: forbidden dep found" && exit 1 || echo "OK: no forbidden deps"
      - name: Boundary check — ferrum-sql must not depend on pyo3 or tokio
        run: |
          cargo tree -p ferrum-sql --edges normal | grep -E "pyo3|tokio" && echo "FAIL: forbidden dep found" && exit 1 || echo "OK: no forbidden deps"

  # ---------------------------------------------------------------------------
  # Rust tests (unit + proptest)
  # ---------------------------------------------------------------------------
  test-rust:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      # ferrum-pyo3 is a cdylib; it is tested via the Python integration tests.
      # Only ferrum-core and ferrum-sql have standalone cargo unit tests.
      - run: cargo test -p ferrum-core -p ferrum-sql

  # ---------------------------------------------------------------------------
  # Python linting
  # ---------------------------------------------------------------------------
  lint-python:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check python/ tests/
      - run: ruff format --check python/ tests/

  # ---------------------------------------------------------------------------
  # Python type checking
  # ---------------------------------------------------------------------------
  type-python:
    name: Python types (ty)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ty
      - run: pip install -e ".[pg,cli,dotenv]"
      - run: ty check python/ferrum

  # ---------------------------------------------------------------------------
  # Import boundary enforcement
  # ---------------------------------------------------------------------------
  import-boundary:
    name: Import boundary (import-linter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install import-linter pydantic
      - run: pip install -e ".[pg]"
      - run: lint-imports

  # ---------------------------------------------------------------------------
  # Python tests — matrix (build extension + pytest)
  # ---------------------------------------------------------------------------
  test-python:
    name: Python tests (ubuntu / py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [check-rust, lint-python]

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ferrum_test
          POSTGRES_USER: ferrum_test
          POSTGRES_DB: ferrum_test
        options: >-
          --health-cmd "pg_isready -U ferrum_test -d ferrum_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      FERRUM_TEST_DSN: postgresql://ferrum_test:ferrum_test@localhost:5432/ferrum_test

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create virtualenv
        run: python -m venv .venv

      - name: Install maturin and dev deps
        run: |
          . .venv/bin/activate
          pip install maturin
          pip install -e ".[dev]"

      - name: Build extension (debug)
        run: |
          . .venv/bin/activate
          maturin develop

      - name: Run unit + property tests
        run: |
          . .venv/bin/activate
          pytest tests/python/unit tests/python/property -v

      - name: Run integration tests
        run: |
          . .venv/bin/activate
          pytest tests/python/integration -m integration -v

  # Service containers (postgres) are Linux-only on GitHub-hosted runners.
  # macOS jobs build the extension and run unit/property tests only.
  test-python-macos:
    name: Python tests (macos / py${{ matrix.python-version }})
    runs-on: macos-latest
    needs: [check-rust, lint-python]

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create virtualenv
        run: python -m venv .venv

      - name: Install maturin and dev deps
        run: |
          . .venv/bin/activate
          pip install maturin
          pip install -e ".[dev]"

      - name: Build extension (debug)
        run: |
          . .venv/bin/activate
          maturin develop

      - name: Run unit + property tests
        run: |
          . .venv/bin/activate
          pytest tests/python/unit tests/python/property -v

  # Windows ships sdist-only (ADR-005), but we still verify the extension builds
  # and unit/property tests pass. Postgres service containers are Linux-only, so
  # integration tests are skipped here (as on macOS).
  test-python-windows:
    name: Python tests (windows / py${{ matrix.python-version }})
    runs-on: windows-latest
    needs: [check-rust, lint-python]

    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-python@v5
        id: setup-python
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create virtualenv
        run: python -m venv .venv

      # setup-python ships python313.lib (etc.) but PyO3's abi3 linker looks for
      # python3.lib (LNK1181). The libs dir is $env:pythonLocation\libs — NOT
      # under python-path, which is the interpreter exe. Copy a python*.lib to
      # python3.lib there and export LIB so the MSVC linker can find it.
      - name: Ensure python3.lib for PyO3 linker
        shell: pwsh
        run: |
          $libs = Join-Path $env:pythonLocation 'libs'
          $target = Join-Path $libs 'python3.lib'
          if (-not (Test-Path $target)) {
            $src = Get-ChildItem -Path (Join-Path $libs 'python*.lib') -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($null -ne $src) {
              Copy-Item $src.FullName $target
              Write-Host "Copied $($src.Name) -> python3.lib in $libs"
            } else {
              Write-Host "WARNING: no python*.lib found in $libs"
            }
          } else {
            Write-Host "python3.lib already present in $libs"
          }
          "LIB=$libs" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # Do not `pip install -e ".[dev]"` on Windows: PEP 517 triggers a release
      # maturin build that is flaky here; maturin develop is the supported path.
      - name: Install maturin and dev deps
        run: |
          . .venv/Scripts/activate
          pip install maturin
          python <<'PY'
          import subprocess
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text())
          optional = data["project"]["optional-dependencies"]
          deps = [d for d in optional["dev"] if not d.startswith("ferrum-orm")]
          for extra in ("cli", "dotenv"):
              deps.extend(optional.get(extra, []))
          subprocess.check_call(["pip", "install", *deps])
          PY
        env:
          PYO3_PYTHON: ${{ steps.setup-python.outputs.python-path }}

      - name: Build extension (debug)
        run: |
          . .venv/Scripts/activate
          maturin develop
        env:
          PYO3_PYTHON: ${{ steps.setup-python.outputs.python-path }}

      - name: Run unit + property tests
        run: |
          . .venv/Scripts/activate
          pytest tests/python/unit tests/python/property -v

  # ---------------------------------------------------------------------------
  # Security qualification gate (required for release)
  # ---------------------------------------------------------------------------
  security-qual:
    name: Security qualification
    runs-on: ubuntu-latest
    needs: [test-python, test-python-macos, test-python-windows]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ferrum_test
          POSTGRES_USER: ferrum_test
          POSTGRES_DB: ferrum_test
        options: >-
          --health-cmd "pg_isready -U ferrum_test -d ferrum_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://ferrum_test:ferrum_test@localhost:5432/ferrum_test

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Create virtualenv
        run: python -m venv .venv
      - name: Install, build extension, and run security tests
        run: |
          . .venv/bin/activate
          pip install maturin
          pip install -e ".[dev]"
          maturin develop
          pytest tests/python/security -m security -v --tb=short

  # ---------------------------------------------------------------------------
  # Docs check: public API changes must have docs diff
  # ---------------------------------------------------------------------------
  docs-check:
    name: Docs check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check that README.md was updated alongside public API changes
        run: |
          # If any file in python/ferrum/ changed, README.md must also have changed.
          PY_CHANGED=$(git diff --name-only origin/main...HEAD -- 'python/ferrum/**' | wc -l)
          README_CHANGED=$(git diff --name-only origin/main...HEAD -- README.md | wc -l)
          if [ "$PY_CHANGED" -gt 0 ] && [ "$README_CHANGED" -eq 0 ]; then
            echo "::warning::python/ferrum/ changed but README.md was not updated. Public API changes require docs (AGENTS.md §2.8)."
          fi
