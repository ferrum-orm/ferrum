# cargo-deny configuration (schema for cargo-deny 0.18.x).
# Vulnerabilities and unsound advisories are errors by default.

[advisories]
yanked = "deny"
# Known pyo3 0.22.6 advisories. Fixes require pyo3 >=0.29, a major bump that
# changes the PyO3 boundary API (SecurityEngineer review + code migration).
# Tracked for a dedicated upgrade; ignored here so the audit stays actionable.
ignore = [
    "RUSTSEC-2025-0020",  # buffer overflow in PyString::from_object (fixed >=0.24.1)
    "RUSTSEC-2026-0177",  # missing Sync bound on PyCFunction::new_closure (fixed >=0.29.0)
]

[licenses]
# Anything not in `allow` is denied, so copyleft licenses (GPL/AGPL/LGPL) fail
# by default — no separate deny list is needed in this schema.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Workspace-internal crates are referenced by path with no version; that is not
# a real wildcard-dependency risk.
allow-wildcard-paths = true

# Only ferrum-pyo3 may depend on pyo3 (boundary; also enforced structurally in
# ci.yml). `wrappers` permits pyo3 solely when pulled in via ferrum-pyo3.
[[bans.deny]]
name = "pyo3"
wrappers = ["ferrum-pyo3"]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
