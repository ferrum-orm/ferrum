repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: rustfmt
        name: rustfmt
        language: system
        entry: cargo fmt --
        types: [rust]
        pass_filenames: true

      - id: clippy-fast
        name: clippy (fast subset)
        language: system
        entry: cargo clippy --workspace --all-targets --
        types: [rust]
        pass_filenames: false
        args: [-D, warnings]
