version: "3.9"
services:
  db:
    image: mysql:8.4
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: changeme
      MYSQL_USER: ferrum
      MYSQL_PASSWORD: changeme
      MYSQL_DATABASE: ferrum_dev
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysqldata:/var/lib/mysql
volumes:
  mysqldata:
